<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEI — Apprentissage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app" id="app">
  <main class="page-enter">
    <div class="page-title">Apprentissage</div>
    <div class="page-sub">CODING, SKILLS, KNOWLEDGE — LET'S GROW</div>

    <div class="grid-2">
      <div class="card">
        <div class="card-label">Sessions ce mois</div>
        <div class="card-value" id="a-sessions">—</div>
        <div class="card-sub">tâches complétées</div>
      </div>
      <div class="card">
        <div class="card-label">Heures estimées</div>
        <div class="card-value" id="a-heures">—</div>
        <div class="card-sub">investies ce mois</div>
      </div>
    </div>

    <div class="section-header">
      <div class="section-title">Tâches du jour</div>
      <button class="btn btn-primary" onclick="openModal('modal-task')">+ Ajouter</button>
    </div>
    <div class="task-list" id="apprentissage-tasks"></div>
  </main>
</div>

<!-- MODAL — Nouvelle tâche apprentissage -->
<div class="modal-overlay" id="modal-task">
  <div class="modal">
    <div class="modal-title">Nouvelle tâche</div>
    <div class="modal-sub">APPRENTISSAGE</div>
    <div class="form-group">
      <label class="form-label">Titre</label>
      <input class="form-input" id="task-title-input" placeholder="ex: Finir le chapitre CSS flexbox">
    </div>
    <div class="form-group">
      <label class="form-label">XP récompense</label>
      <select class="form-select" id="task-xp-input">
        <option value="5">5 XP — Petite tâche</option>
        <option value="10" selected>10 XP — Tâche normale</option>
        <option value="20">20 XP — Tâche importante</option>
        <option value="30">30 XP — Big move</option>
        <option value="50">50 XP — Tâche majeure</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-task')">Annuler</button>
      <button class="btn btn-primary" onclick="addTask()">Créer</button>
    </div>
  </div>
</div>

<div class="xp-toast" id="xp-toast"></div>

<script src="js/notion.js"></script>
<script src="js/xp.js"></script>
<script src="js/layout.js"></script>
<script src="js/nav.js"></script>
<script src="js/pages/apprentissage.js"></script>
</body>
</html>
