<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEI — Progression</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app" id="app">
  <main class="page-enter">
    <div class="page-title">Progression</div>
    <div class="page-sub">TA COURBE — VIS TON ÉVOLUTION</div>

    <div class="grid-2" style="margin-bottom:32px">
      <div class="card card-inverted">
        <div class="card-label">Niveau actuel</div>
        <div class="card-value" id="prog-level">—</div>
        <div class="card-sub"  id="prog-level-name">chargement…</div>
      </div>
      <div class="card">
        <div class="card-label">XP pour level up</div>
        <div class="card-value" id="prog-xp-needed">—</div>
        <div class="card-sub">points restants</div>
      </div>
    </div>

    <div class="section-header"><div class="section-title">XP par catégorie</div></div>
    <div id="cat-progress"></div>

    <hr>

    <div class="section-header"><div class="section-title">Paliers de niveau</div></div>
    <div id="levels-list"></div>
  </main>
</div>

<div class="xp-toast" id="xp-toast"></div>
<script src="js/notion.js"></script>
<script src="js/xp.js"></script>
<script src="js/layout.js"></script>
<script src="js/nav.js"></script>
<script src="js/pages/progression.js"></script>
</body>
</html>
