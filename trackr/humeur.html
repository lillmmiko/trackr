<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEI — Humeur</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">

  <header>
    <div class="header-left">
      <div class="logo">MEI.</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div class="xp-widget">
      <div class="xp-level-label" id="xp-level-label">LVL 1 — DÉBUTANTE</div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-fill" id="xp-bar-fill" style="width:0%"></div>
      </div>
      <div class="xp-numbers" id="xp-numbers">0 / 100 XP</div>
    </div>
  </header>

  <nav class="sidebar">
    <div class="sidebar-section-label">Navigation</div>
    <a class="nav-item" href="index.html"><span class="nav-icon">◈</span> Dashboard</a>
    <a class="nav-item" href="vinted.html"><span class="nav-icon">💰</span> Vinted / Income</a>
    <a class="nav-item" href="apprentissage.html"><span class="nav-icon">📚</span> Apprentissage</a>
    <a class="nav-item" href="objectifs.html"><span class="nav-icon">🎯</span> Objectifs</a>
    <a class="nav-item" href="humeur.html"><span class="nav-icon">🧠</span> Humeur</a>
    <a class="nav-item" href="routine.html"><span class="nav-icon">⏰</span> Routine</a>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section-label">Stats</div>
    <a class="nav-item" href="progression.html"><span class="nav-icon">📈</span> Progression</a>
    <a class="nav-item" href="journal.html"><span class="nav-icon">📋</span> Journal XP</a>
    <div class="streak-badge">
      <div class="streak-title">🔥 Streak</div>
      <div class="streak-count" id="streak-count">0</div>
      <div class="streak-sub">jours consécutifs</div>
    </div>
  </nav>

  <main class="page-enter">
    <div class="page-title">Humeur & Bien-être</div>
    <div class="page-sub">COMMENT TU TE SENS AUJOURD'HUI ?</div>

    <div class="section-header"><div class="section-title">Check-in du jour</div></div>
    <div class="mood-grid">
      <button class="mood-btn" onclick="selectMood(1,this)">😩<span>Crash</span></button>
      <button class="mood-btn" onclick="selectMood(2,this)">😔<span>Pas top</span></button>
      <button class="mood-btn" onclick="selectMood(3,this)">😐<span>Moyen</span></button>
      <button class="mood-btn" onclick="selectMood(4,this)">🙂<span>Bien</span></button>
      <button class="mood-btn" onclick="selectMood(5,this)">✨<span>On slay</span></button>
    </div>
    <div class="form-group">
      <label class="form-label">Une note ? (optionnel)</label>
      <textarea class="form-textarea" id="mood-note" placeholder="ce que t'as sur le cœur…"></textarea>
    </div>
    <button class="btn btn-primary" onclick="saveMood()">Enregistrer le check-in (+5 XP)</button>

    <hr>
    <div class="section-header"><div class="section-title">Historique humeur</div></div>
    <div id="mood-history"></div>
  </main>
</div>

<div class="xp-toast" id="xp-toast"></div>
<script src="js/notion.js"></script>
<script src="js/xp.js"></script>
<script src="js/shared.js"></script>
<script src="js/pages/humeur.js"></script>
</body>
</html>
