<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MEI — Routine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app" id="app">
  <main class="page-enter">
    <div class="page-title">Routine Quotidienne</div>
    <div class="page-sub">TES HABITUDES = TON FUTUR</div>

    <div class="section-header"><div class="section-title">Aujourd'hui</div></div>
    <div class="routine-grid" id="routine-grid"></div>

    <hr>

    <div class="section-header">
      <div class="section-title">Gérer mes habitudes</div>
      <button class="btn btn-ghost" onclick="openModal('modal-habit')">+ Habitude</button>
    </div>
    <div id="habits-manage"></div>
  </main>
</div>

<div class="modal-overlay" id="modal-habit">
  <div class="modal">
    <div class="modal-title">Nouvelle habitude</div>
    <div class="modal-sub">CONSTRUIS TA ROUTINE</div>
    <div class="form-group">
      <label class="form-label">Nom</label>
      <input class="form-input" id="habit-name" placeholder="ex: Lire 20 min">
    </div>
    <div class="form-group">
      <label class="form-label">Emoji</label>
      <input class="form-input" id="habit-icon" placeholder="📖" maxlength="2">
    </div>
    <div class="form-group">
      <label class="form-label">XP par completion</label>
      <select class="form-select" id="habit-xp">
        <option value="3">3 XP</option>
        <option value="5" selected>5 XP</option>
        <option value="10">10 XP</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-habit')">Annuler</button>
      <button class="btn btn-primary" onclick="addHabit()">Créer</button>
    </div>
  </div>
</div>

<div class="xp-toast" id="xp-toast"></div>
<script src="js/notion.js"></script>
<script src="js/xp.js"></script>
<script src="js/layout.js"></script>
<script src="js/nav.js"></script>
<script src="js/pages/routine.js"></script>
</body>
</html>
